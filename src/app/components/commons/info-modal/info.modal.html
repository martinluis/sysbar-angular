@if (show) {
  <div class="modal-backdrop" (click)="onClose()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <span class="btn btn-outline-danger close-btn col-1 offset-11 " (click)="onClose()">X</span>
      <br>
      <p>{{ message }}</p>
      <br>
    </div>
  </div>
}
