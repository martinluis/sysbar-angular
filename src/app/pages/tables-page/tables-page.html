<app-header />
<div class="container tables-container py-4">
  <h2 class="mb-4">Administración de Mesas</h2>

  <form [formGroup]="formGroup" (ngSubmit)="isEditing() ? update() : add()" class="d-flex flex-row">
    <div class="col-6">
      <div class="form-floating">
        <input type="text" formControlName="name" name="name" class="form-control"  placeholder="Nombre de Mesa"/>
        <label>Nombre de Mesa</label>
      </div>
    </div>
    <div class="col-6 d-flex justify-content-end p-2">
      @if (isEditing()) {
        <button type="button" class="btn btn-outline-danger col-3" (click)="resetForm()">Cancel</button>
      }
      <button type="submit" class="btn btn-outline-success col-3 offset-1" [class.disabled]="!formGroup.valid">
        {{ isEditing() ? 'Actualizar' : 'Agregar' }}
      </button>
    </div>
  </form>

  <hr class="my-4" />

    <div class="table-content-container">
      <div class="d-flex flex-row">
        <div class="col-4 mb-2">
          <input class="form-control" placeholder="Buscar" (input)="searchText.set($any($event.target).value)" [value]="searchText()" >
        </div>
      </div>
      <div class="d-flex flex-row dark-color text-white">
        <div class="col-8 d-flex border  p-2 px-4 pt-3">
          <h5>Nombre</h5>
        </div>
        <div class="col-4 d-flex border p-2 px-4 pt-3 justify-content-center">
          <h5>Acciones</h5>
        </div>
      </div>
      @for (table of tablesFiltered(); track table.id) {
        <div class=" d-flex flex-row" [class.selected]="table.id===selected()?.id">
          <div class="col-8 pt-2 px-3 border">
            <span>{{table.name}}</span>
          </div>
          <div class="col-4 p-2 px-3 border d-flex flex-row justify-content-center">
            <button class="btn btn-sm btn-outline-primary col-3" (click)="edit(table)">Editar</button>
            <button class="btn btn-sm btn-outline-danger col-3 offset-1" (click)="delete(table.id!)">Eliminar</button>
          </div>
        </div>
      }
    </div>

</div>
