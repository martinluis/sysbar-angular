<app-header />
<div class="container users-container py-4">
  <h2 class="mb-4">Administración de Usuarios</h2>

  <form [formGroup]="formGroup" (ngSubmit)="isEditing() ? update() : add()" class="d-flex flex-row">
    <div class="col-4">
      <div class="form-floating">
        <input type="text" formControlName="name" name="name" class="form-control"  placeholder="Nombre de Mesa"/>
        <label>Nombre de Mesa</label>
      </div>
    </div>
    <div class="col-3 ms-4">
      <div class="form-floating">
        <input type="text" formControlName="code" name="code" class="form-control" pattern="[a-zA-Z0-9]*"
               inputmode="text" maxlength="10" placeholder="Codigo"/>
        <label>Codigo</label>
      </div>
    </div>
    <div class="col-4 d-flex justify-content-end pt-2 pb-2">
      @if (isEditing()) {
        <button type="button" class="btn btn-outline-danger col-5" (click)="resetForm()">Cancel</button>
      }
      <button type="submit" class="btn btn-outline-success col-5 offset-1" [class.disabled]="!formGroup.valid">
        {{ isEditing() ? 'Actualizar' : 'Agregar' }}
      </button>
    </div>
  </form>
  <div class="d-flex flex-row">
    <div class="col-1 d-flex pt-4">
      <span class="mt-6 fw-bold">Roles:</span>
    </div>
    <div class="col-11">
      <div class="d-flex flex-wrap mt-4 border rounded-2 p-3" [class.error-border]="formGroup.value.roles?.length===0">
        @for (role of Object.values(Role); track role) {
          <div class="form-check form-switch col-3">
            <input class="form-check-input" type="checkbox" [checked]="formGroup.value.roles?.includes(role)" (change)="onRoleChange($event, role)">
            <label class="form-check-label">{{RoleLabels[role]}}</label>
          </div>
        }
      </div>
    </div>

  </div>

  <hr class="my-4" />

  <div class="user-content-container">
    <div class="d-flex flex-row">
      <div class="col-4 mb-2">
        <input class="form-control" placeholder="Buscar" (input)="searchText.set($any($event.target).value)" [value]="searchText()" >
      </div>
    </div>
    <div class="d-flex flex-row dark-color text-white">
      <div class="col-4 d-flex border  p-2 px-4 pt-3">
        <h5>Nombre</h5>
      </div>
      <div class="col-5 d-flex border p-2 px-4 pt-3 justify-content-center">
        <h5>Roles</h5>
      </div>
      <div class="col-3 d-flex border p-2 px-4 pt-3 justify-content-center">
        <h5>Acciones</h5>
      </div>
    </div>
    @for (user of usersFiltered(); track user.id) {
      <div class=" d-flex flex-row" [class.selected]="user.id===selected()?.id">
        <div class="col-4 pt-2 px-3 border">
          <span>{{user.name}}</span>
        </div>
        <div class="col-5 pt-2 px-3 border">
          <span>{{formatSelectedRoles(user.roles)}}</span>
        </div>
        <div class="col-3 p-2 px-3 border d-flex flex-row justify-content-center">
          <button class="btn btn-sm btn-outline-primary col-5" (click)="edit(user)">Editar</button>
          <button class="btn btn-sm btn-outline-danger col-5 offset-1" (click)="delete(user.id!)">Eliminar</button>
        </div>
      </div>
    }
  </div>

</div>
