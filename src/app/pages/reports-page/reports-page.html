<app-header/>
<div class="container reports-container d-flex flex-column">
  <br>
  <h2>Reporte de Ventas</h2>
  <div class="d-flex flex-row justify-content-end mt-3 border p-3 rounded-2">
    <div class="col-3 d-flex flex-row">
      <span class="col-5 align-content-center text-end">Fecha Inicio</span>
      <div class="col-7 mx-2">
        <div class="input-group">
          <input class="form-control" (click)="dpStart.toggle()" [(ngModel)]="initDate" name="dp" ngbDatepicker #dpStart="ngbDatepicker" placeholder="yyyy-mm-dd" readonly/>
          <button class="btn btn-secondary" (click)="dpStart.toggle()" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" viewBox="0 0 16 16">
              <path d="M6.445 11.688V6.354h-.633A13 13 0 0 0 4.5 7.16v.695c.375-.257.969-.62 1.258-.777h.012v4.61zm1.188-1.305c.047.64.594 1.406 1.703 1.406 1.258 0 2-1.066 2-2.871 0-1.934-.781-2.668-1.953-2.668-.926 0-1.797.672-1.797 1.809 0 1.16.824 1.77 1.676 1.77.746 0 1.23-.376 1.383-.79h.027c-.004 1.316-.461 2.164-1.305 2.164-.664 0-1.008-.45-1.05-.82zm2.953-2.317c0 .696-.559 1.18-1.184 1.18-.601 0-1.144-.383-1.144-1.2 0-.823.582-1.21 1.168-1.21.633 0 1.16.398 1.16 1.23"/>
              <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5M1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="col-3 d-flex flex-row mx-4">
      <span class="col-5 align-content-center text-end">Fecha Final</span>
      <div class="col-7 mx-2">
        <div class="input-group">
          <input class="form-control" (click)="dpEnd.toggle()" [(ngModel)]="endDate" ngbDatepicker #dpEnd="ngbDatepicker" placeholder="yyyy-mm-dd" readonly/>
          <button class="btn btn-secondary" (click)="dpEnd.toggle()" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" viewBox="0 0 16 16">
              <path d="M6.445 11.688V6.354h-.633A13 13 0 0 0 4.5 7.16v.695c.375-.257.969-.62 1.258-.777h.012v4.61zm1.188-1.305c.047.64.594 1.406 1.703 1.406 1.258 0 2-1.066 2-2.871 0-1.934-.781-2.668-1.953-2.668-.926 0-1.797.672-1.797 1.809 0 1.16.824 1.77 1.676 1.77.746 0 1.23-.376 1.383-.79h.027c-.004 1.316-.461 2.164-1.305 2.164-.664 0-1.008-.45-1.05-.82zm2.953-2.317c0 .696-.559 1.18-1.184 1.18-.601 0-1.144-.383-1.144-1.2 0-.823.582-1.21 1.168-1.21.633 0 1.16.398 1.16 1.23"/>
              <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5M1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <button class="btn btn-outline-primary col-2 offset-1" (click)="onSearch()">Buscar</button>
  </div>

  <div class="d-flex flex-column justify-content-center">
    <div class="d-flex flex-row justify-content-center">
      <div class="mt-4 col-10">
        <canvas
          baseChart
          #salesChart
          [data]="salesChartData"
          [options]="salesChartOptions">
        </canvas>
      </div>
    </div>
    <br><br>
    <div class="d-flex flex-row justify-content-center">
      <div class="mt-4 col-10">
        <canvas
          baseChart
          #mostSoldProductsChart
          [data]="mostProductsSoldChartData"
          [options]="mostProductsSoldChartOptions">
        </canvas>
      </div>
    </div>
  </div>
  <br><br>
</div>
