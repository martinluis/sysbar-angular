<app-header />
<div class="container products-container py-4">
  <h2 class="mb-4">Administración de Productos</h2>

  <form [formGroup]="formGroup" (ngSubmit)="isEditing() ? update() : add()">
    <div class="d-flex flex-row">
      <div class="col-5">
        <div class="form-floating mb-3">
          <input type="text" formControlName="name" name="name" class="form-control"  placeholder="Nombre del Producto"/>
          <label>Nombre del Producto</label>
        </div>
      </div>
      <div class="col-2 ms-4">
        <div class="form-floating">
          <select class="form-select" formControlName="type">
            <option [value]="null" disabled>Tipo de Prodcuto</option>
            @for (type of productTypeOptions; track type)  {
              <option [value]="type">
                {{ ProductTypeLabels[type] }}
              </option>
            }
          </select>
          <label>Tipo</label>
        </div>
      </div>
      <div class="col-2 ms-4">
        <div class="form-floating mb-3">
          <input type="number" formControlName="price" name="name"  class="form-control" placeholder="Precio"/>
          <label>Precio</label>
        </div>
      </div>
      <div class="col-2 ms-4">
        <div class="form-floating mb-3">
          <input type="number" formControlName="stock" name="name" class="form-control" placeholder="Stock"/>
          <label>Stock</label>
        </div>
      </div>
    </div>
    <div class="d-flex flex-row mt-4">
      <div class="col-12 d-flex align-items-end justify-content-end">
        @if (isEditing()) {
          <button type="button" class="btn btn-outline-danger col-3" (click)="resetForm()">Cancel</button>
        }
        <button type="submit" class="btn btn-outline-success col-3 offset-1" [class.disabled]="!formGroup.valid">
          {{ isEditing() ? 'Actualizar' : 'Agregar' }}
        </button>
      </div>
    </div>
  </form>

  <hr class="my-4" />

  <div class="product-content-container">
    <div class="d-flex flex-row">
      <div class="col-4 mb-2">
        <input class="form-control" placeholder="Buscar" (input)="searchText.set($any($event.target).value)" [value]="searchText()" >
      </div>
    </div>
    <!-- Table Header -->
    <div class="d-flex flex-row dark-color text-white">
      <div class="col-6 d-flex border px-4 pt-2">
        <h6>Producto</h6>
      </div>
      <div class="col-3 d-flex border justify-content-center px-4 pt-2">
        <h6>Tipo</h6>
      </div>
      <div class="col-3 d-flex border px-4 pt-2 justify-content-center">
        <h6>Acciones</h6>
      </div>
    </div>

    <!-- Table Content -->
    @for (product of productsFiltered(); track product.id) {
      <div class=" d-flex flex-row" [class.selected]="product.id===selected()?.id">
        <div class="col-6 pt-1 px-3 border">
          <span>{{product.name}}</span>
        </div>
        <div class="col-3 pt-1 px-3 border d-flex justify-content-center">
          <span>{{ProductTypeLabels[product.type]}}</span>
        </div>
        <div class="col-3 p-1 px-3 border d-flex flex-row justify-content-center">
          <button class="btn btn-sm btn-outline-primary col-5" (click)="edit(product)">Editar</button>
          <button class="btn btn-sm btn-outline-danger col-5 offset-1" (click)="delete(product.id!)">Eliminar</button>
        </div>
      </div>
    }
  </div>

</div>
